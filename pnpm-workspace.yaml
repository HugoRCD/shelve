packages:
  - 'packages/*'
  - 'apps/*'

shamefullyHoist: true
autoInstallPeers: true
ignoreWorkspaceRootCheck: true

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  vue-demi: false
  better-sqlite3: true
  sharp: true

overrides:
  nuxt-og-image: 6.4.8

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  # Nuxt
  - '@nuxt/*'
  - '@nuxtjs/*'
  - 'nuxt'
  - 'nuxt-*'
  # Vercel
  - '@vercel/*'
  - '@ai-sdk/*'
  - 'ai'
